<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A.R.C.H.O.N.</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ======================================================
     BOOT SCREEN
====================================================== -->

<section id="bootScreen" class="screen active">

    <div class="boot-container">

        <img
            src="assets/logo.png"
            alt="ARCHON Logo"
            class="logo">

        <h1 class="title">
            A.R.C.H.O.N.
        </h1>

        <p class="tagline">
            ONE MIND<br>
            TWO EXISTENCES
        </p>

        <div id="bootTerminal" class="terminal"></div>

        <button id="enterButton">
            ENTER DATABASE
        </button>

    </div>

</section>

<!-- ======================================================
     TRANSITION
====================================================== -->

<div id="transition"></div>

<!-- ======================================================
     MAIN MENU
====================================================== -->

<section id="menuScreen" class="screen">

    <div class="menu-container">

        <h2>MAIN MENU</h2>

        <div id="menuList">

            <button class="menu-btn" data-page="mission">
                MISSION
            </button>

            <button class="menu-btn" data-page="place">
                PLACE
            </button>

            <button class="menu-btn" data-page="database">
                DATABASE
            </button>

            <button class="menu-btn" data-page="archive">
                ARCHIVE
            </button>

            <button class="menu-btn" data-page="settings">
                SETTINGS
            </button>

        </div>

    </div>

</section>

<!-- ======================================================
     MISSION
====================================================== -->

<section id="missionScreen" class="screen">

    <div class="page-container">

        <div id="missionTerminal" class="terminal"></div>

        <div id="missionContent" class="content hidden">

            <!-- Akan diisi JavaScript -->

        </div>

        <button class="backButton">
            RETURN
        </button>

    </div>

</section>

<!-- ======================================================
     PLACE
====================================================== -->

<section id="placeScreen" class="screen">

    <div class="page-container">

        <div class="terminal">

            PLACE DATABASE NOT AVAILABLE

        </div>

        <button class="backButton">
            RETURN
        </button>

    </div>

</section>

<!-- ======================================================
     DATABASE
====================================================== -->

<section id="databaseScreen" class="screen">

    <div class="page-container">

        <div class="terminal">

            DATABASE LOCKED

        </div>

        <button class="backButton">
            RETURN
        </button>

    </div>

</section>

<!-- ======================================================
     ARCHIVE
====================================================== -->

<section id="archiveScreen" class="screen">

    <div class="page-container">

        <div class="terminal">

            ARCHIVE EMPTY

        </div>

        <button class="backButton">
            RETURN
        </button>

    </div>

</section>

<!-- ======================================================
     SETTINGS
====================================================== -->

<section id="settingsScreen" class="screen">

    <div class="page-container">

        <div class="terminal">

            SETTINGS MODULE

        </div>

        <button class="backButton">
            RETURN
        </button>

    </div>

</section>

<!-- ======================================================
     AUDIO
====================================================== -->

<audio
    id="typingSound"
    preload="auto">
</audio>

<audio
    id="clickSound"
    preload="auto">
</audio>

<!-- ======================================================
     SCRIPT
====================================================== -->

<script src="script.js"></script>

</body>
</html>
